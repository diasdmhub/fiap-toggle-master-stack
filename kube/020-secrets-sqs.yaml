# Definição de variáveis de autenticação sensíveis por manifesto
##################################################
# RECOMENDA-SE DEFINIR OS SECRETS SEM O MANIFEST
#
# kubectl create secret generic auth-secrets \
#   --namespace=toggle \
#   --from-literal=AWS_SQS_URL='https://sqs.us-east-1.amazonaws.com/123456789012/fila' \
#   --annotation=description="Variáveis de autenticação sensíveis"
##################################################
apiVersion: external-secrets.io/v1
#apiVersion: v1
kind: ExternalSecret
#kind: Secret
metadata:
  name: sqs-secrets
  namespace: toggle
  annotations:
    description: "Variáveis de autenticação sensíveis"
#type: Opaque

# Chave codificada com Base64 -> echo -n 'valor' | base64
#data:
  # URL da fila SQS da AWS
#  AWS_SQS_URL:

spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: sqs-secrets
    creationPolicy: Owner
  data:
    - secretKey: AWS_SQS_URL
      remoteRef:
        key: fiap-toggle/sqs    # Nome do secret no AWS Secrets Manager
        property: queue_url     # Campo JSON do secret
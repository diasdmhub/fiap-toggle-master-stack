# Definição de Pods para a aplicação Analytics
# É NECESSÁRIO DEFINIR ABAIXO O REPOSITÓRIO DA IMAGEM
# algo como 123456789012.abc.def.region.amazonaws.com/toggle/analytics-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: toggle
  labels:
    app: analytics-service
  annotations:
    description: "Definição de Pods para a aplicação Analytics"

spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      serviceAccountName: fiap-toggle-serv-acc
      containers:
      - name: analytics
        image: toggle/analytics-service
        ports:
        - containerPort: 8005

# Indicação do ConfigMap e Secrets para o serviço
        envFrom:
        - configMapRef:
            name: analytics-config
        - secretRef:
            name: sqs-secrets

# Definição de recursos (requests e limits - 1:4)
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "400m"
            memory: "512Mi"

# Definição de probes de saúde para o serviço
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5

# Referência da URL do SQS para o KEDA
        env:
        - name: AWS_SQS_URL_SEC
          valueFrom:
            secretKeyRef:
              name: sqs-secrets
              key: AWS_SQS_URL
---

# Definição de Service para a aplicação analytics
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: toggle
  annotations:
    description: "Service para a aplicação Analytics"
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8005
    targetPort: 8005
    protocol: TCP

# Serviço Interno do tipo ClusterIP
  type: ClusterIP